[General]

; ============================================================
; IDIOMA Y FORMATO
; ============================================================
Language=es
Use12Hour=false

; ============================================================
; RELOJ, FECHA Y POSICIÓN
; ClockPosition: left | center | right
; ClockPositionV: top | center | bottom
; ClockOrientation: horizontal | vertical
; ============================================================
ClockPosition=left
ClockPositionV=center
ClockOrientation=horizontal
SplitLayout=false
UnlockCentered=false
DateBold=true
ClockMarginH=80
ClockMarginV=15
ClockFontSize=110
DateFontSize=30

; ============================================================
; TIPOGRAFÍA
; ============================================================
FontFamily=
CustomFontFile=assets/fonts/Hearty Sacred.otf

; ============================================================
; COLOR DE ACENTO
; AccentMode: auto | custom
; En video se usa AccentColor porque no se analiza cada fotograma.
; ============================================================
AccentMode=custom
AccentColor=#c6f4eb

; ============================================================
; FONDO
; BackgroundType: image | video
; EnableVideo permite desactivar el video sin cambiar BackgroundType.
; ============================================================
BackgroundType=video
EnableVideo=false
BackgroundImage=assets/images/image_3.jpg
BackgroundVideo=assets/videos/video_1.mp4
BackgroundVideoFallbackGif=assets/gif/Galactic Void Astronaut.gif
OverlayOpacity=0.15

; ============================================================
; PANELES
; PanelStyle / LoginPanelStyle: gradient | glass | none
; La versión estable usa vidrio tintado. EnableBlur queda reservado
; para una implementación posterior de desenfoque real.
; ============================================================
EnableBlur=false
PanelBlurRadius=45
PanelStyle=glass
TextBackgroundOpacity=0.45
PanelRadius=0
PanelTintOpacity=0.25

; ============================================================
; PANTALLA DE INICIO DE SESIÓN
; ============================================================
LoginDarkenEnabled=true
LoginDarkenOpacity=0.25
LoginPanelStyle=glass