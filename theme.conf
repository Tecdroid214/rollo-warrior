[General]

; ════════════════════════════════════════
;  IDIOMA Y FORMATO
;  LANGUAGE AND FORMAT
; ════════════════════════════════════════

; Language puede ser: es (Español) | en (English)
; Language can be: es (Spanish) | en (English)
Language=es

; Use12Hour: true = 12 horas | false = 24 horas
; Use12Hour: true = 12-hour format | false = 24-hour format
Use12Hour=false


; ════════════════════════════════════════
;  RELOJ, FECHA Y POSICIÓN
;  CLOCK, DATE AND POSITION
; ════════════════════════════════════════

; ClockPosition puede ser: left | center | right
; ClockPosition can be: left | center | right
ClockPosition=left

; ClockPositionV puede ser: top | center | bottom
; ClockPositionV can be: top | center | bottom
ClockPositionV=center

; ClockOrientation: horizontal (11:07 AM en una línea) | vertical (hora y minutos apilados, AM/PM pequeño debajo)
; Solo aplica en modo "junto" (SplitLayout=false o ClockPosition=center)
; ClockOrientation: horizontal (11:07 AM in one line) | vertical (stacked hour/minute, small AM/PM below)
; Only applies in "together" mode (SplitLayout=false or ClockPosition=center)
ClockOrientation=horizontal

; SplitLayout: true = reloj y fecha en lados opuestos (solo aplica si ClockPosition es left o right)
; SplitLayout: true = clock and date on opposite sides (only applies if ClockPosition is left or right)
SplitLayout=false

; UnlockCentered: true = el texto de desbloqueo siempre centrado en pantalla | false = sigue al reloj (izq/centro/der)
; UnlockCentered: true = unlock text always centered on screen | false = follows the clock (left/center/right)
UnlockCentered=false

; DateBold: true = fecha en negritas | false = fecha normal
; DateBold: true = bold date text | false = normal date text
DateBold=true

; Margen horizontal del bloque reloj, en píxeles (aplica en left/right)
; Horizontal margin of the clock block, in pixels (applies on left/right)
ClockMarginH=80

; Margen vertical del bloque reloj, en píxeles (aplica en top/bottom)
; Vertical margin of the clock block, in pixels (applies on top/bottom)
ClockMarginV=15

; Tamaño de letra del reloj, en píxeles
; Clock font size, in pixels
ClockFontSize=110

; Tamaño de letra de la fecha, en píxeles
; Date font size, in pixels
DateFontSize=30


; ════════════════════════════════════════
;  TIPOGRAFÍA
;  TYPOGRAPHY
; ════════════════════════════════════════

; Nombre de una tipografía instalada en tu sistema. Déjalo vacío para usar la fuente por defecto
; Name of a font installed on your system. Leave empty to use the default font
FontFamily=

; Ruta a un archivo de fuente (.ttf u .otf) en tu carpeta assets, para usar una tipografía descargada
; sin instalarla en el sistema. Si se deja vacío, se usa FontFamily o la fuente por defecto.
; Path to a font file (.ttf or .otf) in your assets folder, to use a downloaded typeface
; without installing it system-wide. If left empty, FontFamily or the default font is used.
CustomFontFile=assets/fonts/Hearty Sacred.otf


; ════════════════════════════════════════
;  COLORES / ACENTO
;  COLORS / ACCENT
; ════════════════════════════════════════

; AccentMode: auto (color extraído del fondo) | custom (usa AccentColor de abajo)
; AccentMode: auto (color extracted from wallpaper) | custom (uses AccentColor below)
AccentMode=auto

; Color personalizado del reloj/fecha/texto de desbloqueo (solo si AccentMode=custom)
; Custom clock/date/unlock-text color (only if AccentMode=custom)
AccentColor=#c6f4eb


; ════════════════════════════════════════
;  FONDO DE PANTALLA
;  BACKGROUND / WALLPAPER
; ════════════════════════════════════════

; BackgroundType: image (imagen estática) | video (fondo en movimiento)
; BackgroundType: image (static image) | video (moving background)
BackgroundType=video

; Ruta de la imagen de fondo, relativa a la carpeta del tema
; Path to the background image, relative to the theme folder
BackgroundImage=assets/images/image_3.jpg

; Ruta del video de fondo, relativa a la carpeta del tema (solo si BackgroundType=video)
; Path to the background video, relative to the theme folder (only if BackgroundType=video)
BackgroundVideo=assets/videos/video_3.mp4

BackgroundVideoFallbackGif=assets/gif/Galactic Void Astronaut.gif

; Oscurecido general de toda la pantalla (0.0 = nada, 1.0 = negro total)
; Overall screen darkening (0.0 = none, 1.0 = fully black)
OverlayOpacity=0.15


; ════════════════════════════════════════
;  EFECTOS AVANZADOS
;  ADVANCED EFFECTS
; ════════════════════════════════════════

; EnableBlur: true = blur real con shader en los paneles glass | false = sin blur (solo tinte oscuro)
; EnableBlur: true = real shader blur on glass panels | false = no blur (dark tint only)
EnableBlur=true

; EnableVideo: true = reproduce video de fondo | false = usa imagen estática
; EnableVideo: true = play background video | false = use static image
EnableVideo=false


; ════════════════════════════════════════
;  PANEL DEL RELOJ (gradiente / vidrio)
;  CLOCK PANEL (gradient / glass)
; ════════════════════════════════════════

; PanelStyle: gradient (franja difuminada) | glass (panel con blur real) | none (sin fondo)
; PanelStyle: gradient (blurred strip) | glass (real blur panel) | none (no background)
PanelStyle=glass

; Oscurecido extra SOLO detrás del reloj/fecha, para legibilidad (usado por PanelStyle=gradient)
; Extra darkening ONLY behind the clock/date, for readability (used by PanelStyle=gradient)
TextBackgroundOpacity=0.45

; Radio de desenfoque del panel de vidrio (solo si PanelStyle=glass y EnableBlur=true)
; Blur radius of the glass panel (only if PanelStyle=glass and EnableBlur=true)
PanelBlurRadius=45

; Radio de las esquinas del panel de vidrio (solo si PanelStyle=glass)
; Corner radius of the glass panel (only if PanelStyle=glass)
PanelRadius=0

; Tinte oscuro sobre el panel de vidrio, 0.0 a 1.0 (solo si PanelStyle=glass)
; Dark tint over the glass panel, 0.0 to 1.0 (only if PanelStyle=glass)
PanelTintOpacity=0.25


; ════════════════════════════════════════
;  PANTALLA DE USUARIO / CONTRASEÑA
;  USER / PASSWORD SCREEN
; ════════════════════════════════════════

; LoginDarkenEnabled: true = oscurece un poco más el fondo al pasar a la pantalla de usuario/contraseña
; LoginDarkenEnabled: true = darkens the background a bit more when entering the user/password screen
LoginDarkenEnabled=true

; Intensidad de ese oscurecido extra, 0.0 a 1.0
; Intensity of that extra darkening, 0.0 to 1.0
LoginDarkenOpacity=0.25

; LoginPanelStyle: gradient | glass | none — mismo sistema que PanelStyle, pero para la pantalla de login
; LoginPanelStyle: gradient | glass | none — same system as PanelStyle, but for the login screen
LoginPanelStyle=glass